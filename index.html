<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to My Gym — Personal Portfolio</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Loading Screen -->
    <div id="loading-screen">
        <div class="loader-content">
            <div class="dumbbell-loader">
                <div class="weight left"></div>
                <div class="bar"></div>
                <div class="weight right"></div>
            </div>
            <h1>Loading the Gym...</h1>
            <p>Get ready to explore!</p>
        </div>
    </div>

    <!-- Welcome Overlay -->
    <div id="welcome-overlay" style="display: none;">
        <div class="welcome-content">
            <h1>Welcome to My Gym 💪</h1>
            <p>Walk around and click on equipment to learn about me!</p>
            <div class="controls-hint">
                <span><kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> to move</span>
                <span><kbd>Mouse</kbd> to look around</span>
                <span><kbd>Click</kbd> on equipment to interact</span>
            </div>
            <button id="start-btn">Let's Go!</button>
        </div>
    </div>

    <!-- Info Panel -->
    <div id="info-panel" style="display: none;">
        <button id="close-panel">&times;</button>
        <div id="panel-icon"></div>
        <h2 id="panel-title"></h2>
        <div id="panel-content"></div>
    </div>

    <!-- Crosshair -->
    <div id="crosshair">+</div>

    <!-- Interaction Hint -->
    <div id="interact-hint" style="display: none;">
        <div class="hint-title">SECTION</div>
        <div class="hint-sub">Click to view</div>
    </div>

    <!-- Mini instructions -->
    <div id="controls-reminder">
        <span>WASD — Move &nbsp; | &nbsp; Mouse — Look &nbsp; | &nbsp; ESC — Release cursor</span>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.161.0/examples/jsm/"
        }
    }
    </script>
    <script type="module" src="js/main.js"></script>
</body>
</html>
